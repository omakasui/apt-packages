name: Setup APT tools and GPG key
description: Install dpkg-dev/apt-utils/gnupg2 and import the signing key.

inputs:
  gpg-private-key:
    required: true
  gpg-key-id:
    required: true

runs:
  using: composite
  steps:
    - name: Install APT tools
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          dpkg-dev apt-utils gnupg2

    - name: Import GPG key
      shell: bash
      env:
        GPG_PRIVATE_KEY: ${{ inputs.gpg-private-key }}
      run: |
        echo "$GPG_PRIVATE_KEY" | gpg --batch --import
        FINGERPRINT=$(gpg --fingerprint --with-colons "${{ inputs.gpg-key-id }}" \
          | awk -F: '/^fpr/{print $10; exit}')
        echo "${FINGERPRINT}:6:" | gpg --import-ownertrust
