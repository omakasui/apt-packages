name: Commit and push
description: Snapshot build artifacts then retry fetch+reset+push up to 5 times.

inputs:
  message:
    required: true

runs:
  using: composite
  steps:
    - name: Commit and push
      shell: bash
      run: |
        git config user.name  "omakasui-bot"
        git config user.email "bot@omakasui.org"

        DISTS_SNAPSHOT=$(mktemp -d)
        INDEX_SNAPSHOT=$(mktemp -d)
        cp -r dists/. "$DISTS_SNAPSHOT/"
        cp index/packages.tsv "$INDEX_SNAPSHOT/" 2>/dev/null || true

        for i in 1 2 3 4 5; do
          git fetch origin main
          git reset --hard origin/main

          cp -r "$DISTS_SNAPSHOT/." dists/
          mkdir -p index
          cp "$INDEX_SNAPSHOT/packages.tsv" index/packages.tsv 2>/dev/null || true

          git add -f dists/ index/
          git add -u index/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            break
          fi

          git commit -m "${{ inputs.message }}"
          git push && break
          echo "Push failed (attempt ${i}/5), retrying..."
          sleep $((i * 2))
        done
