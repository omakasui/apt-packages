name: Promote packages to stable

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - promote-package
          - promote-all
      package:
        description: 'Package name — required for promote-package'
        required: false
        type: string
      version:
        description: 'Version — for promote-package only (leave empty to promote all dev versions)'
        required: false
        type: string
      suites:
        description: 'Space-separated suites (e.g. "noble" or "trixie noble"). Leave empty for all.'
        required: false
        type: string
      exclude:
        description: 'For promote-all: space-separated package names to exclude from bulk promotion'
        required: false
        type: string

# Must stay in sync with build-matrix.yml in omakasui/build-apt-packages.
env:
  ALL_SUITES: "trixie noble"
  ALL_DEV_SUITES: "trixie-dev noble-dev"

jobs:
  promote:
    name: Promote packages to stable
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup APT tools and GPG key
        id: setup-apt
        uses: ./.github/actions/setup-apt
        with:
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Promote package in index manifest
        if: inputs.action == 'promote-package'
        run: |
          SUITES="${{ inputs.suites }}"
          [[ -z "$SUITES" ]] && SUITES="$ALL_SUITES"
          bash scripts/promote-packages.sh \
            --pkg     "${{ inputs.package }}" \
            --version "${{ inputs.version }}" \
            --suites  "$SUITES"

      - name: Promote all dev packages to stable
        if: inputs.action == 'promote-all'
        run: |
          SUITES="${{ inputs.suites }}"
          [[ -z "$SUITES" ]] && SUITES="$ALL_SUITES"
          bash scripts/promote-packages.sh \
            --all \
            --suites  "$SUITES" \
            --exclude "${{ inputs.exclude }}"

      - name: Regenerate APT metadata
        env:
          GPG_KEY_ID: ${{ steps.setup-apt.outputs.fingerprint }}
        run: |
          bash scripts/update-index.sh --suites "$ALL_SUITES"
          bash scripts/sign-release.sh --suites "$ALL_SUITES $ALL_DEV_SUITES" --key-id "$GPG_KEY_ID"

      - name: Build commit message
        id: msg
        run: |
          if [[ "${{ inputs.action }}" == "promote-all" ]]; then
            if [[ -n "${{ inputs.exclude }}" ]]; then
              MSG="apt: promote all to stable (excl: ${{ inputs.exclude }}) [$(date '+%Y-%m-%d')]"
            else
              MSG="apt: promote all dev packages to stable [$(date '+%Y-%m-%d')]"
            fi
          else
            PKG="${{ inputs.package }}"
            VERSION="${{ inputs.version }}"
            if [[ -n "$VERSION" ]]; then
              MSG="apt: promote ${PKG} ${VERSION} to stable [$(date '+%Y-%m-%d')]"
            else
              MSG="apt: promote ${PKG} to stable [$(date '+%Y-%m-%d')]"
            fi
          fi
          echo "value=${MSG}" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: ${{ steps.msg.outputs.value }}

      - name: Trigger omakasui.org rebuild
        env:
          GH_TOKEN: ${{ secrets.OMAKASUI_ORG_DISPATCH_TOKEN }}
        run: |
          gh api repos/omakasui/omakasui.org/dispatches \
            --method POST \
            --field event_type=apt-packages-updated
