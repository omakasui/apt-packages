# Triggered by repository_dispatch from build-apt-packages, or manually via workflow_dispatch.
# Actions: package-updated | remove-package | rebuild-index
name: Update APT repo

on:
  repository_dispatch:
    types: [package-updated, remove-package, rebuild-index]

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - package-updated
          - remove-package
          - rebuild-index
      package:
        description: 'Package name — required for package-updated and remove-package'
        required: false
        type: string
      version:
        description: 'Version — required for package-updated only'
        required: false
        type: string
      suites:
        description: 'Suites — space-separated, e.g. "trixie" or "trixie noble". Required for package-updated.'
        required: false
        type: string

# All known suite codenames. Update here when adding a new distro.
# Must stay in sync with build-matrix.yml in omakasui/build-apt-packages.
env:
  ALL_SUITES: "trixie noble"

jobs:
  update:
    name: Update APT repo
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve parameters
        id: params
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "action=${{ github.event.action }}"                  >> "$GITHUB_OUTPUT"
            echo "package=${{ github.event.client_payload.package }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
            echo "suites=${{ github.event.client_payload.suites }}"   >> "$GITHUB_OUTPUT"
            PRODUCES=$(echo '${{ toJson(github.event.client_payload.produces) }}' | jq -c '.')
            echo "produces=${PRODUCES}"                               >> "$GITHUB_OUTPUT"
          else
            echo "action=${{ inputs.action }}"   >> "$GITHUB_OUTPUT"
            echo "package=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}"  >> "$GITHUB_OUTPUT"
            echo "suites=${{ inputs.suites }}"    >> "$GITHUB_OUTPUT"
            echo "produces=[]"                   >> "$GITHUB_OUTPUT"
          fi

      - name: Install APT tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev apt-utils gnupg2

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          FINGERPRINT=$(gpg --fingerprint --with-colons "${{ secrets.GPG_KEY_ID }}" \
            | awk -F: '/^fpr/{print $10; exit}')
          echo "${FINGERPRINT}:6:" | gpg --import-ownertrust

      - name: '[package-updated] Prune old versions from pool'
        if: steps.params.outputs.action == 'package-updated'
        run: |
          PKG="${{ steps.params.outputs.package }}"
          VERSION="${{ steps.params.outputs.version }}"
          SUITES="${{ steps.params.outputs.suites }}"
          PRODUCES_JSON='${{ steps.params.outputs.produces }}'

          if [[ -z "$SUITES" ]]; then
            echo "ERROR: suites is required for package-updated"; exit 1
          fi

          if [[ "$PRODUCES_JSON" == "null" || "$PRODUCES_JSON" == "[]" || -z "$PRODUCES_JSON" ]]; then
            PRODUCED_PKGS="$PKG"
          else
            PRODUCED_PKGS=$(echo "$PRODUCES_JSON" | jq -r '.[]')
          fi

          for suite in $SUITES; do
            for arch in amd64 arm64 all; do
              pool_dir="pool/${suite}/${arch}"
              mkdir -p "$pool_dir"
              while IFS= read -r produced; do
                find "$pool_dir" -maxdepth 1 -name "${produced}_*.deb" \
                  ! -name "${produced}_${VERSION}_${arch}.deb" \
                  -print -delete
              done <<< "$PRODUCED_PKGS"
            done
          done

      - name: '[package-updated] Download .deb from build-apt-packages release'
        if: steps.params.outputs.action == 'package-updated'
        env:
          GH_TOKEN: ${{ secrets.APT_PKG_DISPATCH_TOKEN }}
        run: |
          PKG="${{ steps.params.outputs.package }}"
          VERSION="${{ steps.params.outputs.version }}"
          SUITES="${{ steps.params.outputs.suites }}"
          PRODUCES_JSON='${{ steps.params.outputs.produces }}'
          TAG="${PKG}-${VERSION}"

          if [[ "$PRODUCES_JSON" == "null" || "$PRODUCES_JSON" == "[]" || -z "$PRODUCES_JSON" ]]; then
            PRODUCED_PKGS="$PKG"
          else
            PRODUCED_PKGS=$(echo "$PRODUCES_JSON" | jq -r '.[]')
          fi

          # Maps suite codename to the distro label used in build-apt-packages release asset names.
          # Add an entry here whenever a new suite is added to ALL_SUITES.
          declare -A DISTRO_MAP=([noble]="ubuntu2404" [trixie]="debian13")

          for suite in $SUITES; do
            distro="${DISTRO_MAP[$suite]}"
            [[ -z "$distro" ]] && { echo "ERROR: no DISTRO_MAP entry for '${suite}'"; exit 1; }

            while IFS= read -r produced; do
              mkdir -p "pool/${suite}/all"
              ALL_DST="pool/${suite}/all/${produced}_${VERSION}_all.deb"

              # Try distro-tagged arch:all (repackage), then plain arch:all, then arch-specific.
              if gh release download "$TAG" \
                    --repo omakasui/build-apt-packages \
                    --pattern "${produced}_${VERSION}_${distro}_all.deb" \
                    --output "$ALL_DST" 2>/dev/null || \
                 gh release download "$TAG" \
                    --repo omakasui/build-apt-packages \
                    --pattern "${produced}_${VERSION}_all.deb" \
                    --output "$ALL_DST" 2>/dev/null; then
                echo "OK (arch:all): $(du -sh "$ALL_DST")"
                continue
              fi

              for arch in amd64 arm64; do
                pool_dir="pool/${suite}/${arch}"
                mkdir -p "$pool_dir"
                src="${produced}_${VERSION}_${distro}_${arch}.deb"
                dst="${pool_dir}/${produced}_${VERSION}_${arch}.deb"
                gh release download "$TAG" \
                  --repo omakasui/build-apt-packages \
                  --pattern "$src" \
                  --output "$dst"
                [[ ! -f "$dst" ]] && { echo "ERROR: $dst not found after download"; exit 1; }
                echo "OK: $(du -sh "$dst")"
              done
            done <<< "$PRODUCED_PKGS"
          done

      - name: '[remove-package] Delete .deb files for package'
        if: steps.params.outputs.action == 'remove-package'
        run: |
          PKG="${{ steps.params.outputs.package }}"
          SUITES="${{ steps.params.outputs.suites }}"

          [[ -z "$PKG" ]] && { echo "ERROR: package is required for remove-package"; exit 1; }

          if [[ -n "$SUITES" ]]; then
            SEARCH_DIRS=$(for s in $SUITES; do echo "pool/${s}"; done | tr '\n' ' ')
          else
            SEARCH_DIRS="pool/"
          fi

          REMOVED=0
          while IFS= read -r -d '' f; do
            rm "$f" && REMOVED=$((REMOVED + 1))
          done < <(find $SEARCH_DIRS -maxdepth 3 -name "${PKG}_*.deb" -print0)
          echo "Removed ${REMOVED} file(s)."

      - name: '[rebuild-index] no-op'
        if: steps.params.outputs.action == 'rebuild-index'
        run: echo "Rebuilding index from existing pool state."

      - name: Regenerate APT metadata
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          for suite in $ALL_SUITES; do
            for arch in amd64 arm64; do
              pkg_dir="dists/${suite}/main/binary-${arch}"
              pool_arch="pool/${suite}/${arch}"
              pool_all="pool/${suite}/all"
              mkdir -p "$pkg_dir" "$pool_arch"

              HAS_DEBS=false
              [[ -n "$(ls -A "$pool_arch" 2>/dev/null)" ]] && HAS_DEBS=true
              [[ -d "$pool_all" && -n "$(ls -A "$pool_all" 2>/dev/null)" ]] && HAS_DEBS=true

              if [[ "$HAS_DEBS" == "false" ]]; then
                : > "${pkg_dir}/Packages"
              else
                {
                  dpkg-scanpackages --arch "${arch}" "${pool_arch}" /dev/null 2>/dev/null || true
                  [[ -d "$pool_all" && -n "$(ls -A "$pool_all" 2>/dev/null)" ]] && \
                    dpkg-scanpackages --arch "${arch}" "${pool_all}" /dev/null 2>/dev/null || true
                } > "${pkg_dir}/Packages"
              fi

              gzip -k -f "${pkg_dir}/Packages"
              xz   -k -f "${pkg_dir}/Packages"
            done

            apt-ftparchive \
              -o APT::FTPArchive::Release::Origin="omakasui" \
              -o APT::FTPArchive::Release::Label="omakasui-apt-packages" \
              -o APT::FTPArchive::Release::Suite="${suite}" \
              -o APT::FTPArchive::Release::Codename="${suite}" \
              -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
              -o APT::FTPArchive::Release::Components="main" \
              -o APT::FTPArchive::Release::Description="omakasui custom packages" \
              release "dists/${suite}" > "dists/${suite}/Release"

            gpg --default-key "$GPG_KEY_ID" \
                --armor --detach-sign --batch --yes \
                -o "dists/${suite}/Release.gpg" "dists/${suite}/Release"
            gpg --default-key "$GPG_KEY_ID" \
                --clearsign --batch --yes \
                -o "dists/${suite}/InRelease" "dists/${suite}/Release"
          done

          gpg --armor --export "$GPG_KEY_ID" > omakasui.gpg.key

      - name: Commit and push
        run: |
          git config user.name  "omakasui-bot"
          git config user.email "bot@omakasui.org"

          find pool/ -name "*.deb" -print0 | xargs -0 git add -f
          git add -f dists/ omakasui.gpg.key
          git add -u pool/

          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            ACTION="${{ steps.params.outputs.action }}"
            PKG="${{ steps.params.outputs.package }}"
            VERSION="${{ steps.params.outputs.version }}"
            case "$ACTION" in
              package-updated) MSG="apt: ${PKG} ${VERSION} [$(date '+%Y-%m-%d')]" ;;
              remove-package)  MSG="apt: remove ${PKG} [$(date '+%Y-%m-%d')]" ;;
              *)               MSG="apt: rebuild index [$(date '+%Y-%m-%d')]" ;;
            esac
            git commit -m "$MSG"
            git push
          fi