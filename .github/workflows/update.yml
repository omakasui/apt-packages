# Triggered by repository_dispatch from build-apt-packages, or manually via workflow_dispatch.
# Actions: package-updated | remove-package | rebuild-index | clean-pool
name: Update APT repo

on:
  repository_dispatch:
    types: [packages-updated, package-updated, remove-package, rebuild-index, clean-pool]

  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - package-updated
          - remove-package
          - rebuild-index
          - clean-pool
      package:
        description: 'Package name — required for package-updated and remove-package'
        required: false
        type: string
      version:
        description: 'Version — required for package-updated only'
        required: false
        type: string
      suites:
        description: 'Suites — space-separated, e.g. "trixie" or "trixie noble". Required for package-updated.'
        required: false
        type: string
      pattern:
        description: 'Glob pattern for clean-pool (e.g. "omakasui-lazygit*")'
        required: false
        type: string
      produces:
        description: 'Space-separated list of produced package names (e.g. "omakasui-fastfetch"). Leave empty to use package name.'
        required: false
        type: string
      channel:
        description: 'Publishing channel (stable or dev)'
        required: false
        default: 'stable'
        type: choice
        options:
          - stable
          - dev

# All known suite codenames. Update here when adding a new distro.
# Must stay in sync with build-matrix.yml in omakasui/build-apt-packages.
env:
  ALL_SUITES: "trixie noble"
  ALL_DEV_SUITES: "trixie-dev noble-dev"

# Serialize runs so concurrent package-updated events don't overwrite each other.
concurrency:
  group: update-apt-repo
  cancel-in-progress: false

jobs:
  update:
    name: Update APT repo
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve parameters
        id: params
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "action=${{ github.event.action }}"                  >> "$GITHUB_OUTPUT"
            echo "package=${{ github.event.client_payload.package }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
            echo "suites=${{ github.event.client_payload.suites }}"   >> "$GITHUB_OUTPUT"
            echo "pattern=${{ github.event.client_payload.pattern }}" >> "$GITHUB_OUTPUT"
            PRODUCES=$(echo '${{ toJson(github.event.client_payload.produces) }}' | jq -c '.')
            echo "produces=${PRODUCES}"                               >> "$GITHUB_OUTPUT"
            # packages-updated batch payload: JSON array of {package,version,suites,produces,channel}
            PKGS_JSON=$(echo '${{ toJson(github.event.client_payload.packages) }}' | jq -c '. // []')
            echo "packages_json=${PKGS_JSON}"                         >> "$GITHUB_OUTPUT"
            # Single-package channel (default: stable).
            CD_CHANNEL='${{ github.event.client_payload.channel }}'
            echo "channel=${CD_CHANNEL:-stable}"                      >> "$GITHUB_OUTPUT"
          else
            echo "action=${{ inputs.action }}"   >> "$GITHUB_OUTPUT"
            echo "package=${{ inputs.package }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ inputs.version }}"  >> "$GITHUB_OUTPUT"
            echo "suites=${{ inputs.suites }}"    >> "$GITHUB_OUTPUT"
            echo "pattern=${{ inputs.pattern }}" >> "$GITHUB_OUTPUT"
            # Convert space-separated produces input to JSON array.
            if [[ -n "${{ inputs.produces }}" ]]; then
              PRODUCES_JSON=$(echo "${{ inputs.produces }}" | tr ' ' '\n' | jq -Rc '[.,inputs]' 2>/dev/null || echo "[]")
              echo "produces=${PRODUCES_JSON}"    >> "$GITHUB_OUTPUT"
            else
              echo "produces=[]"                  >> "$GITHUB_OUTPUT"
            fi
            echo "channel=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install APT tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev apt-utils gnupg2

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          FINGERPRINT=$(gpg --fingerprint --with-colons "${{ secrets.GPG_KEY_ID }}" \
            | awk -F: '/^fpr/{print $10; exit}')
          echo "${FINGERPRINT}:6:" | gpg --import-ownertrust

      - name: '[packages-updated] Register all packages in index manifest'
        if: steps.params.outputs.action == 'packages-updated'
        env:
          GH_TOKEN: ${{ secrets.APT_PKG_DISPATCH_TOKEN }}
        run: |
          # Iterate the packages JSON array and register each entry in sequence.
          # Running them sequentially in a single job avoids concurrent push conflicts.
          PKGS_JSON='${{ steps.params.outputs.packages_json }}'
          while IFS= read -r entry; do
            PKG=$(echo      "$entry" | jq -r '.package')
            VERSION=$(echo  "$entry" | jq -r '.version')
            SUITES=$(echo   "$entry" | jq -r '.suites')
            PRODUCES=$(echo "$entry" | jq -r '.produces | if length == 0 then "" else join(" ") end')
            CHANNEL=$(echo  "$entry" | jq -r '.channel // "stable"')

            echo "==> Registering: ${PKG} ${VERSION} (suites: ${SUITES}, channel: ${CHANNEL})"
            bash scripts/register-package.sh \
              --pkg      "$PKG" \
              --version  "$VERSION" \
              --suites   "$SUITES" \
              --produces "$PRODUCES" \
              --channel  "$CHANNEL"
          done < <(echo "$PKGS_JSON" | jq -c '.[]')

      - name: '[package-updated] Register package in index manifest'
        if: steps.params.outputs.action == 'package-updated'
        env:
          GH_TOKEN: ${{ secrets.APT_PKG_DISPATCH_TOKEN }}
        run: |
          PRODUCES_JSON='${{ steps.params.outputs.produces }}'
          if [[ "$PRODUCES_JSON" == "null" || "$PRODUCES_JSON" == "[]" || -z "$PRODUCES_JSON" ]]; then
            PRODUCES=""
          else
            PRODUCES=$(echo "$PRODUCES_JSON" | jq -r '.[]' | tr '\n' ' ')
          fi

          bash scripts/register-package.sh \
            --pkg      "${{ steps.params.outputs.package }}" \
            --version  "${{ steps.params.outputs.version }}" \
            --suites   "${{ steps.params.outputs.suites }}" \
            --produces "$PRODUCES" \
            --channel  "${{ steps.params.outputs.channel }}"

      - name: '[remove-package] Remove entries from index manifest'
        if: steps.params.outputs.action == 'remove-package'
        run: |
          bash scripts/remove-entries.sh \
            --package "${{ steps.params.outputs.package }}" \
            --suites  "${{ steps.params.outputs.suites }}"

      - name: '[clean-pool] Remove entries matching pattern from index manifest'
        if: steps.params.outputs.action == 'clean-pool'
        run: |
          bash scripts/remove-entries.sh \
            --pattern "${{ steps.params.outputs.pattern }}" \
            --suites  "${{ steps.params.outputs.suites }}"

      - name: '[rebuild-index] no-op'
        if: steps.params.outputs.action == 'rebuild-index'
        run: echo "Rebuilding index from existing index/packages.tsv."

      - name: Regenerate APT metadata
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          touch index/packages.tsv
          bash scripts/update-index.sh --suites "$ALL_SUITES"
          bash scripts/sign-release.sh --suites "$ALL_SUITES $ALL_DEV_SUITES" --key-id "$GPG_KEY_ID"

      - name: Commit and push
        run: |
          git config user.name  "omakasui-bot"
          git config user.email "bot@omakasui.org"

          ACTION="${{ steps.params.outputs.action }}"
          PKG="${{ steps.params.outputs.package }}"
          VERSION="${{ steps.params.outputs.version }}"
          PATTERN="${{ steps.params.outputs.pattern }}"
          case "$ACTION" in
            packages-updated) MSG="apt: batch update [$(date '+%Y-%m-%d')]" ;;
            package-updated)  MSG="apt: ${PKG} ${VERSION} [$(date '+%Y-%m-%d')]" ;;
            remove-package)   MSG="apt: remove ${PKG} [$(date '+%Y-%m-%d')]" ;;
            clean-pool)       MSG="apt: clean ${PATTERN} [$(date '+%Y-%m-%d')]" ;;
            *)                MSG="apt: rebuild index [$(date '+%Y-%m-%d')]" ;;
          esac

          # Snapshot artifacts produced in this run before any git reset.
          DISTS_SNAPSHOT=$(mktemp -d)
          INDEX_SNAPSHOT=$(mktemp -d)
          GPG_KEY_SNAPSHOT=$(mktemp -d)
          cp -r dists/. "$DISTS_SNAPSHOT/"
          cp omakasui.gpg.key "$GPG_KEY_SNAPSHOT/"
          cp index/packages.tsv "$INDEX_SNAPSHOT/" 2>/dev/null || true

          for i in 1 2 3 4 5; do
            # Always start from the current remote state to avoid merge conflicts.
            git fetch origin main
            git reset --hard origin/main

            # Re-apply this run's artifacts on top of the latest remote state.
            cp -r "$DISTS_SNAPSHOT/." dists/
            cp "$GPG_KEY_SNAPSHOT/omakasui.gpg.key" omakasui.gpg.key
            mkdir -p index
            cp "$INDEX_SNAPSHOT/packages.tsv" index/packages.tsv 2>/dev/null || true

            git add -f dists/ omakasui.gpg.key index/
            git add -u index/ 2>/dev/null || true

            if git diff --cached --quiet; then
              echo "Nothing to commit."
              break
            fi

            git commit -m "$MSG"
            git push && break
            echo "Push failed (attempt ${i}/5), retrying..."
            sleep $((i * 2))
          done