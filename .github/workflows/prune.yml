name: Prune stale releases

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  prune:
    name: Delete stale releases
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prune stale releases
        env:
          GH_TOKEN: ${{ secrets.APT_PKG_DISPATCH_TOKEN }}
        run: bash scripts/prune-releases.sh --delete
