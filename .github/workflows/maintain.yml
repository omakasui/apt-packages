name: Maintain APT repo

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - rebuild-index
          - remove-package
          - clean-pool
          - freeze-package
          - unfreeze-package
      package:
        description: 'Package name — required for remove-package, freeze-package, unfreeze-package'
        required: false
        type: string
      version:
        description: 'Version — unused, kept for compatibility'
        required: false
        type: string
      suites:
        description: 'Space-separated suites (e.g. "noble" or "trixie noble"). Leave empty for all.'
        required: false
        type: string
      pattern:
        description: 'Glob pattern for clean-pool (e.g. "omakasui-lazygit*")'
        required: false
        type: string

# Must stay in sync with build-matrix.yml in omakasui/build-apt-packages.
env:
  ALL_SUITES: "trixie noble resolute"
  ALL_DEV_SUITES: "trixie-dev noble-dev resolute-dev"
  ALL_ARCHES: "amd64 arm64"

jobs:
  maintain:
    name: Maintain APT repo
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate inputs
        run: |
          ACTION="${{ inputs.action }}"
          case "$ACTION" in
            remove-package)
              if [[ -z "${{ inputs.package }}" ]]; then
                echo "ERROR: package is required for remove-package"; exit 1
              fi
              ;;
            clean-pool)
              if [[ -z "${{ inputs.pattern }}" ]]; then
                echo "ERROR: pattern is required for clean-pool"; exit 1
              fi
              ;;
            freeze-package)
              if [[ -z "${{ inputs.package }}" ]]; then
                echo "ERROR: package is required for freeze-package"; exit 1
              fi
              ;;
            unfreeze-package)
              if [[ -z "${{ inputs.package }}" ]]; then
                echo "ERROR: package is required for unfreeze-package"; exit 1
              fi
              ;;
            rebuild-index)
              echo "Rebuilding index from existing packages.tsv."
              ;;
          esac

      - name: Setup APT tools and GPG key
        id: setup-apt
        uses: ./.github/actions/setup-apt
        with:
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: '[remove-package] Remove entries from index manifest'
        if: inputs.action == 'remove-package'
        run: |
          bash scripts/remove-entries.sh \
            --package "${{ inputs.package }}" \
            --suites  "${{ inputs.suites }}"

      - name: '[clean-pool] Remove entries matching pattern from index manifest'
        if: inputs.action == 'clean-pool'
        run: |
          bash scripts/remove-entries.sh \
            --pattern "${{ inputs.pattern }}" \
            --suites  "${{ inputs.suites }}"

      - name: '[rebuild-index] no-op'
        if: inputs.action == 'rebuild-index'
        run: echo "Rebuilding index from existing index/packages.tsv."

      - name: '[freeze-package] Add to freeze.list'
        if: inputs.action == 'freeze-package'
        run: |
          SUITES="${{ inputs.suites }}"
          [[ -z "$SUITES" ]] && SUITES="$ALL_SUITES"
          touch index/freeze.list
          for suite in $SUITES; do
            grep -qxF "$suite ${{ inputs.package }}" index/freeze.list || \
              echo "$suite ${{ inputs.package }}" >> index/freeze.list
          done
          sort -o index/freeze.list index/freeze.list
          echo "Frozen: ${{ inputs.package }} in suites: $SUITES"

      - name: '[unfreeze-package] Remove from freeze.list'
        if: inputs.action == 'unfreeze-package'
        run: |
          SUITES="${{ inputs.suites }}"
          PKG="${{ inputs.package }}"
          if [[ -n "$SUITES" ]]; then
            for suite in $SUITES; do
              sed -i "/^${suite} ${PKG}$/d" index/freeze.list
            done
          else
            sed -i "/^[^ ]* ${PKG}$/d" index/freeze.list
          fi
          echo "Unfrozen: ${PKG}${SUITES:+ in suites: $SUITES}"

      - name: Regenerate APT metadata
        if: ${{ !contains(fromJSON('["freeze-package","unfreeze-package"]'), inputs.action) }}
        env:
          GPG_KEY_ID: ${{ steps.setup-apt.outputs.fingerprint }}
        run: |
          touch index/packages.tsv
          bash scripts/update-index.sh --suites "$ALL_SUITES"
          bash scripts/sign-release.sh --suites "$ALL_SUITES $ALL_DEV_SUITES" --key-id "$GPG_KEY_ID"

      - name: Update README packages table
        run: bash scripts/update-readme.sh --suites "$ALL_SUITES" --arches "$ALL_ARCHES"

      - name: Build commit message
        id: msg
        run: |
          ACTION="${{ inputs.action }}"
          PKG="${{ inputs.package }}"
          PATTERN="${{ inputs.pattern }}"
          case "$ACTION" in
            remove-package) MSG="maint: remove ${PKG} [$(date '+%Y-%m-%d')]" ;;
            clean-pool)     MSG="maint: clean ${PATTERN} [$(date '+%Y-%m-%d')]" ;;
            freeze-package)   MSG="maint: freeze ${PKG} [$(date '+%Y-%m-%d')]" ;;
            unfreeze-package) MSG="maint: unfreeze ${PKG} [$(date '+%Y-%m-%d')]" ;;
            *)              MSG="maint: rebuild index [$(date '+%Y-%m-%d')]" ;;
          esac
          echo "value=${MSG}" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        uses: ./.github/actions/commit-and-push
        with:
          message: ${{ steps.msg.outputs.value }}

      - name: Trigger omakasui.org rebuild
        env:
          GH_TOKEN: ${{ secrets.OMAKASUI_ORG_DISPATCH_TOKEN }}
        run: |
          gh api repos/omakasui/omakasui.org/dispatches \
            --method POST \
            --field event_type=apt-packages-updated